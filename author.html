<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 이야기 관리 — 동네서점</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: url('bookstore.png') center top / cover fixed;
      background-color: #3a2410;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── 나무 패널 전체 ── */
    .panel {
      width: 100%; max-width: 880px;
      border-radius: 18px;
      border: 6px solid #4a2808;
      box-shadow:
        0 0 0 3px #7a4820,
        0 12px 48px rgba(0,0,0,0.7),
        inset 0 0 0 2px #c8902a;
      overflow: hidden;
      background: #2e1508;
    }

    /* ── 패널 상단 헤더 ── */
    .panel-header {
      background: linear-gradient(180deg, #3d1f08 0%, #2e1508 100%);
      border-bottom: 4px solid #5a3010;
      padding: 1.1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: relative;
    }
    .panel-title {
      font-size: 1.4rem; font-weight: 800;
      color: #f5deb3; font-family: 'Pretendard', serif;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      letter-spacing: -0.3px;
    }
    .panel-header-right { display: flex; align-items: center; gap: 0.75rem; }
    .panel-new-btn {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1.1rem; border-radius: 999px;
      background: #c8902a; border: 2px solid #f0b84a;
      color: #fff; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .panel-new-btn:hover { background: #a87020; }
    .panel-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: #8b2020; border: 2px solid #c04040;
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; text-decoration: none;
    }
    .panel-close:hover { background: #6b1818; }

    /* ── 테이블 헤더 ── */
    .table-head {
      display: grid; grid-template-columns: 110px 1fr 220px;
      background: #5a3010;
      padding: 0.7rem 1.5rem; gap: 1rem;
      border-bottom: 2px solid #3d1f08;
    }
    .table-head span {
      font-size: 0.82rem; font-weight: 800;
      color: #f5deb3; text-align: center; letter-spacing: 0.05em;
    }
    .table-head span:nth-child(2) { text-align: left; }

    /* ── 테이블 바디 ── */
    .table-body { background: #f5e6c8; }
    .table-row {
      display: grid; grid-template-columns: 110px 1fr 220px;
      padding: 0.9rem 1.5rem; gap: 1rem; align-items: center;
      border-bottom: 1px solid #d9c09a;
      transition: background 0.15s;
    }
    .table-row:nth-child(even) { background: #fdf5e4; }
    .table-row:nth-child(odd) { background: #f0ddb0; }
    .table-row:hover { background: #e8cc90; }
    .table-row:last-child { border-bottom: none; }

    /* 상태 뱃지 */
    .status-badge {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;
      padding: 0.3rem 0.8rem; border-radius: 999px;
      font-size: 0.78rem; font-weight: 700;
      white-space: nowrap; margin: 0 auto;
    }
    .status-public   { background: #d4f0e0; color: #1e7a4a; border: 1.5px solid #74c69d; }
    .status-private  { background: #fde8c8; color: #8B5E3C; border: 1.5px solid #c8a87a; }
    .status-writing  { background: #e8d5f5; color: #6a2c8a; border: 1.5px solid #b48acc; }

    /* 제목 */
    .story-title-cell {
      font-size: 1rem; font-weight: 700; color: #3d2b1f;
      font-family: 'Pretendard', serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 액션 버튼들 */
    .action-btns {
      display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap;
    }
    .action-btn {
      display: flex; align-items: center; gap: 0.3rem;
      padding: 0.38rem 0.85rem; border-radius: 999px;
      border: 2px solid #c8a87a; background: #fdf5e4;
      color: #3d2b1f; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      white-space: nowrap;
    }
    .action-btn:hover { background: #8B5E3C; color: #fff; border-color: #8B5E3C; }
    .action-btn-publish { border-color: #74c69d; color: #1e7a4a; }
    .action-btn-publish:hover { background: #2d6a4f; color: #fff; border-color: #2d6a4f; }
    .action-btn-unpublish { border-color: #c8a87a; color: #8B5E3C; }
    .action-btn-danger { border-color: #e07070; color: #a03030; }
    .action-btn-danger:hover { background: #a03030; color: #fff; border-color: #a03030; }

    /* 빈 상태 */
    .empty-row {
      padding: 3.5rem 2rem; text-align: center;
      background: #fdf5e4; color: #a08060;
    }
    .empty-row p { margin-top: 0.5rem; font-size: 0.88rem; }

    /* ── 패널 하단 푸터 ── */
    .panel-footer {
      background: linear-gradient(0deg, #3d1f08 0%, #2e1508 100%);
      border-top: 4px solid #5a3010;
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-stats {
      display: flex; gap: 1.5rem;
    }
    .footer-stat { text-align: center; }
    .footer-stat-num { font-size: 1.2rem; font-weight: 800; color: #f5deb3; }
    .footer-stat-lbl { font-size: 0.68rem; color: #c8a060; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .footer-close {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1.5rem; border-radius: 999px;
      background: #4a2808; border: 2px solid #8b5e3c;
      color: #f5deb3; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
      text-decoration: none;
    }
    .footer-close:hover { background: #3a1808; border-color: #c8902a; }

    /* ── 새 스토리 모달 ── */
    .create-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .create-modal-overlay.open { display: flex; }
    .create-modal {
      background: #fdf5e4; border-radius: 14px;
      border: 3px solid #c8a87a;
      padding: 2rem; width: 100%; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .create-modal h2 {
      font-size: 1.2rem; font-weight: 800; color: #3d2b1f;
      font-family: 'Pretendard', serif; margin-bottom: 1.25rem;
    }

    /* 삭제 확인 모달 */
    .delete-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .delete-modal-overlay.open { display: flex; }
    .delete-modal {
      background: #fdf5e4; border-radius: 14px;
      border: 3px solid #e07070;
      padding: 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .delete-modal h2 { font-size: 1.1rem; font-weight: 800; color: #a03030; margin-bottom: 0.75rem; }
  </style>
</head>
<body>

  <!-- 메인 패널 -->
  <div class="panel">

    <!-- 헤더 -->
    <div class="panel-header">
      <div class="panel-title">📚 내 이야기 관리</div>
      <div class="panel-header-right">
        <button class="panel-new-btn" onclick="openCreateModal()">✏️ 새 이야기</button>
        <a href="index.html" class="panel-close" title="홈으로">✕</a>
      </div>
    </div>

    <!-- 테이블 헤더 -->
    <div class="table-head">
      <span>상태</span>
      <span>제목</span>
      <span>작용</span>
    </div>

    <!-- 테이블 바디 -->
    <div class="table-body" id="story-table"></div>

    <!-- 푸터 -->
    <div class="panel-footer">
      <div class="footer-stats" id="footer-stats"></div>
      <a href="index.html" class="footer-close">✕ 닫기</a>
    </div>
  </div>

  <!-- 새 스토리 모달 -->
  <div class="create-modal-overlay" id="create-modal">
    <div class="create-modal">
      <h2>✏️ 새 이야기 만들기</h2>
      <div class="form-group"><label>제목 *</label><input type="text" id="inp-title" placeholder="예: 기사의 선택"></div>
      <div class="form-group"><label>한 줄 소개</label><input type="text" id="inp-desc" placeholder="독자에게 보여질 짧은 설명"></div>
      <div class="form-group"><label>작가 이름</label><input type="text" id="inp-author" placeholder="닉네임"></div>
      <div class="form-group"><label>장르</label>
        <select id="inp-genre">
          <option value="SF">SF</option><option value="판타지">판타지</option>
          <option value="로맨스">로맨스</option><option value="공포">공포</option>
          <option value="미스터리">미스터리</option><option value="기타" selected>기타</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeCreateModal()">취소</button>
        <button class="btn btn-primary btn-sm" onclick="createStory()">만들고 편집하기</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="delete-modal-overlay" id="delete-modal">
    <div class="delete-modal">
      <h2>🗑 스토리 삭제</h2>
      <p style="color:#7a5c3e;font-size:0.9rem">삭제하면 복구할 수 없어요. 정말 삭제하시겠어요?</p>
      <p id="delete-title" style="margin-top:0.75rem;font-weight:700;font-size:0.95rem;color:#3d2b1f"></p>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeDeleteModal()">취소</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    let deleteId = null;

    function getStatus(st) {
      if (st.published) return { label: '공개', cls: 'status-public', icon: '✅' };
      if (Object.keys(st.nodes || {}).length > 0) return { label: '작성 중', cls: 'status-writing', icon: '✍️' };
      return { label: '비공개', cls: 'status-private', icon: '🔒' };
    }

    function render() {
      const stories = Storage.getAll();
      const pub = stories.filter(s => s.published).length;
      const nodes = stories.reduce((s, st) => s + Object.keys(st.nodes || {}).length, 0);

      document.getElementById('footer-stats').innerHTML = `
        <div class="footer-stat"><div class="footer-stat-num">${stories.length}</div><div class="footer-stat-lbl">전체</div></div>
        <div class="footer-stat"><div class="footer-stat-num">${pub}</div><div class="footer-stat-lbl">공개</div></div>
        <div class="footer-stat"><div class="footer-stat-num">${nodes}</div><div class="footer-stat-lbl">총 장면</div></div>`;

      const table = document.getElementById('story-table');
      if (stories.length === 0) {
        table.innerHTML = `
          <div class="empty-row">
            <div style="font-size:2.5rem">✍️</div>
            <p>아직 작성한 이야기가 없어요.<br>새 이야기 버튼을 눌러 시작해보세요!</p>
          </div>`;
        return;
      }

      table.innerHTML = stories.map(st => {
        const s = getStatus(st);
        return `
          <div class="table-row">
            <div style="display:flex;justify-content:center">
              <span class="status-badge ${s.cls}">${s.icon} ${s.label}</span>
            </div>
            <div class="story-title-cell" title="${escapeHtml(st.title)}">${escapeHtml(st.title)}</div>
            <div class="action-btns">
              <button class="action-btn" onclick="location.href='editor.html?id=${st.id}'">✏️ 수정</button>
              <button class="action-btn ${st.published ? 'action-btn-unpublish' : 'action-btn-publish'}"
                onclick="togglePublish('${st.id}')">
                ${st.published ? '🔒 비공개' : '🚀 공개'}
              </button>
              <button class="action-btn action-btn-danger" onclick="openDeleteModal('${st.id}')">🗑</button>
            </div>
          </div>`;
      }).join('');
    }

    function openCreateModal() {
      document.getElementById('create-modal').classList.add('open');
      setTimeout(() => document.getElementById('inp-title').focus(), 50);
    }
    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('open');
      ['inp-title','inp-desc','inp-author'].forEach(id => document.getElementById(id).value = '');
    }
    function createStory() {
      const title = document.getElementById('inp-title').value.trim();
      if (!title) { showToast('제목을 입력해주세요', 'error'); return; }
      const story = createEmptyStory(
        title,
        document.getElementById('inp-desc').value.trim(),
        document.getElementById('inp-author').value.trim() || '익명',
        document.getElementById('inp-genre').value
      );
      Storage.save(story);
      location.href = `editor.html?id=${story.id}`;
    }
    function togglePublish(id) {
      const st = Storage.get(id); if (!st) return;
      if (!st.published && Object.keys(st.nodes || {}).length < 2) {
        showToast('장면이 2개 이상 있어야 공개할 수 있어요', 'error'); return;
      }
      st.published = !st.published;
      Storage.save(st);
      showToast(st.published ? '공개되었어요 🎉' : '비공개로 전환되었어요', 'success');
      render();
    }
    function openDeleteModal(id) {
      deleteId = id;
      document.getElementById('delete-title').textContent = Storage.get(id)?.title || '';
      document.getElementById('delete-modal').classList.add('open');
    }
    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('open');
      deleteId = null;
    }
    function confirmDelete() {
      if (!deleteId) return;
      Storage.delete(deleteId);
      closeDeleteModal();
      showToast('삭제되었어요', 'success');
      render();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeCreateModal(); closeDeleteModal(); }
    });
    document.getElementById('inp-title')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') createStory();
    });

    initSampleData();
    render();
  </script>
</body>
</html>
