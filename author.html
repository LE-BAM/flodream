<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작가 공간 — Flodream</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .layout { max-width: 880px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .page-title { font-size: 1.5rem; font-weight: 700; }
    .page-sub { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; font-weight: 400; }

    /* Stats */
    .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-align: center;
      transition: background 0.15s;
    }
    .stat-card:hover { background: var(--surface-3); }
    .stat-num  { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-lbl  { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

    /* Story list */
    .story-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .story-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      transition: background 0.15s;
    }
    .story-item:hover { background: var(--surface-3); }
    .story-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem;
      flex-shrink: 0;
    }
    .story-info { flex: 1; min-width: 0; }
    .story-item-title {
      font-weight: 700; font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 0.3rem;
    }
    .story-item-meta {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap;
    }
    .story-actions { display: flex; gap: 0.35rem; flex-shrink: 0; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">✦ Flodream</a>
    <ul class="navbar-nav">
      <li><a href="index.html">둘러보기</a></li>
      <li><a href="author.html" class="active">작가 공간</a></li>
    </ul>
  </nav>

  <div class="layout">
    <div class="page-header">
      <div>
        <h1 class="page-title">작가 공간</h1>
        <p class="page-sub">내 스토리를 관리하고 새 작품을 만들어보세요</p>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">새 스토리</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div class="story-list" id="story-list"></div>
  </div>

  <!-- Create Modal -->
  <div class="modal-overlay hidden" id="create-modal">
    <div class="modal">
      <h2 class="modal-title">새 스토리 만들기</h2>
      <div class="form-group">
        <label>제목 *</label>
        <input type="text" id="inp-title" placeholder="예: 2033, 서울의 잿더미">
      </div>
      <div class="form-group">
        <label>한 줄 소개</label>
        <input type="text" id="inp-desc" placeholder="독자에게 보여질 짧은 설명">
      </div>
      <div class="form-group">
        <label>작가 이름</label>
        <input type="text" id="inp-author" placeholder="닉네임">
      </div>
      <div class="form-group">
        <label>장르</label>
        <select id="inp-genre">
          <option value="SF">SF</option>
          <option value="판타지">판타지</option>
          <option value="로맨스">로맨스</option>
          <option value="공포">공포</option>
          <option value="미스터리">미스터리</option>
          <option value="기타" selected>기타</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeCreateModal()">취소</button>
        <button class="btn btn-primary btn-sm" onclick="createStory()">만들고 편집하기</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal">
      <h2 class="modal-title">스토리 삭제</h2>
      <p style="color:var(--text-muted);font-size:0.9rem">삭제하면 복구할 수 없어요. 정말 삭제하시겠어요?</p>
      <p id="delete-title" style="margin-top:0.75rem;font-weight:700;font-size:0.95rem"></p>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeDeleteModal()">취소</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    const GENRE_EMOJI = { SF:'🚀', '판타지':'⚔️', '로맨스':'💕', '공포':'👻', '미스터리':'🔍', '기타':'📖' };
    let deleteId = null;

    function render() {
      const stories = Storage.getAll();
      const pub = stories.filter(s => s.published).length;
      const nodes = stories.reduce((s, st) => s + Object.keys(st.nodes || {}).length, 0);

      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-card"><div class="stat-num">${stories.length}</div><div class="stat-lbl">전체 스토리</div></div>
        <div class="stat-card"><div class="stat-num">${pub}</div><div class="stat-lbl">발행됨</div></div>
        <div class="stat-card"><div class="stat-num">${nodes}</div><div class="stat-lbl">총 장면</div></div>`;

      const list = document.getElementById('story-list');
      if (stories.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon" style="font-size:2.5rem">✍️</div>
            <h3>아직 작성한 스토리가 없어요</h3>
            <p>첫 번째 인터랙티브 픽션을 만들어보세요!</p>
            <button class="btn btn-primary" onclick="openCreateModal()">새 스토리 만들기</button>
          </div>`;
        return;
      }

      list.innerHTML = stories.map(st => {
        const emoji = GENRE_EMOJI[st.genre] || '📖';
        const nc = Object.keys(st.nodes || {}).length;
        const ec = Object.values(st.nodes || {}).filter(n => n.isEnding).length;
        const date = new Date(st.createdAt).toLocaleDateString('ko-KR');
        return `
          <div class="story-item">
            <div class="story-icon" style="background:${st.coverColor}22;color:${st.coverColor}">${emoji}</div>
            <div class="story-info">
              <div class="story-item-title">${escapeHtml(st.title)}</div>
              <div class="story-item-meta">
                <span class="badge ${st.published ? 'badge-success' : 'badge-muted'}">${st.published ? '발행됨' : '임시저장'}</span>
                <span>${nc}개 장면</span>
                <span>${ec}개 엔딩</span>
                <span>👁 ${(st.views||0).toLocaleString()}</span>
                <span>${date}</span>
              </div>
            </div>
            <div class="story-actions">
              <button class="btn btn-ghost btn-sm" onclick="window.open('play.html?id=${st.id}','_blank')">미리보기</button>
              <button class="btn btn-secondary btn-sm" onclick="location.href='editor.html?id=${st.id}'">편집</button>
              <button class="btn ${st.published ? 'btn-ghost' : 'btn-success'} btn-sm" onclick="togglePublish('${st.id}')">
                ${st.published ? '발행 취소' : '발행'}
              </button>
              <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${st.id}')">삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    function openCreateModal() {
      document.getElementById('create-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('inp-title').focus(), 50);
    }
    function closeCreateModal() {
      document.getElementById('create-modal').classList.add('hidden');
      ['inp-title','inp-desc','inp-author'].forEach(id => document.getElementById(id).value = '');
    }
    function createStory() {
      const title = document.getElementById('inp-title').value.trim();
      if (!title) { showToast('제목을 입력해주세요', 'error'); return; }
      const story = createEmptyStory(
        title,
        document.getElementById('inp-desc').value.trim(),
        document.getElementById('inp-author').value.trim() || '익명',
        document.getElementById('inp-genre').value
      );
      Storage.save(story);
      location.href = `editor.html?id=${story.id}`;
    }
    function togglePublish(id) {
      const st = Storage.get(id);
      if (!st) return;
      if (!st.published && Object.keys(st.nodes || {}).length < 2) {
        showToast('장면이 2개 이상 있어야 발행할 수 있어요', 'error'); return;
      }
      st.published = !st.published;
      Storage.save(st);
      showToast(st.published ? '발행되었어요' : '발행이 취소되었어요', 'success');
      render();
    }
    function openDeleteModal(id) {
      deleteId = id;
      document.getElementById('delete-title').textContent = Storage.get(id)?.title || '';
      document.getElementById('delete-modal').classList.remove('hidden');
    }
    function closeDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); deleteId = null; }
    function confirmDelete() {
      if (!deleteId) return;
      Storage.delete(deleteId);
      closeDeleteModal();
      showToast('삭제되었어요', 'success');
      render();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeCreateModal(); closeDeleteModal(); } });
    document.getElementById('inp-title')?.addEventListener('keydown', e => { if (e.key === 'Enter') createStory(); });

    initSampleData();
    render();
  </script>
</body>
</html>
