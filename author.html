<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 이야기 관리 — 동네서점</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: url('bookstore.png') center top / cover fixed;
      background-color: #3a2410;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── 패널 래퍼 ── */
    .panel-wrap {
      position: relative;
      width: 100%;
      max-width: 960px;
      filter: drop-shadow(0 16px 48px rgba(0,0,0,0.75));
    }
    .panel-img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      user-select: none;
    }

    /* ── 스토리 목록 오버레이 (rows 영역) ── */
    .story-overlay {
      position: absolute;
      top: 22%;
      left: 7%;
      right: 7%;
      bottom: 20%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(139,94,60,0.4) transparent;
    }
    .story-overlay::-webkit-scrollbar { width: 4px; }
    .story-overlay::-webkit-scrollbar-thumb { background: rgba(139,94,60,0.35); border-radius: 2px; }

    /* ── 스토리 행 ── */
    .story-row {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      align-items: center;
      gap: 0.5rem;
      padding: 0 0.75rem;
      min-height: 54px;
      border-bottom: 1px solid rgba(200,168,120,0.25);
      transition: background 0.12s;
    }
    .story-row:nth-child(odd)  { background: rgba(240,221,176,0.75); }
    .story-row:nth-child(even) { background: rgba(253,245,228,0.75); }
    .story-row:hover           { background: rgba(232,210,144,0.88); }
    .story-row:last-child      { border-bottom: none; }

    /* 상태 배지 */
    .status-badge {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.25rem;
      padding: 0.2rem 0.55rem; border-radius: 999px;
      font-size: 0.68rem; font-weight: 700; white-space: nowrap;
    }
    .status-public   { background: #d4f0e0; color: #1e7a4a; border: 1px solid #74c69d; }
    .status-writing  { background: #e8d5f5; color: #6a2c8a; border: 1px solid #b48acc; }
    .status-private  { background: #fde8c8; color: #8B5E3C; border: 1px solid #c8a87a; }

    /* 제목 */
    .story-title-cell {
      font-size: 0.88rem; font-weight: 700;
      color: #3d2b1f; font-family: 'Pretendard', serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 액션 버튼 */
    .action-btns { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .action-btn {
      padding: 0.22rem 0.6rem; border-radius: 999px;
      font-size: 0.68rem; font-weight: 700;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer; border: 1.5px solid; white-space: nowrap;
      transition: all 0.12s;
    }
    .ab-edit    { background: rgba(139,94,60,0.08); color: #8B5E3C; border-color: rgba(139,94,60,0.3); }
    .ab-edit:hover { background: #8B5E3C; color: #fff; }
    .ab-pub     { background: rgba(93,138,60,0.08); color: #5d8a3c; border-color: rgba(93,138,60,0.3); }
    .ab-pub:hover { background: #5d8a3c; color: #fff; }
    .ab-unpub   { background: rgba(139,94,60,0.08); color: #8B5E3C; border-color: rgba(139,94,60,0.3); }
    .ab-unpub:hover { background: #8B5E3C; color: #fff; }
    .ab-del     { background: rgba(192,64,64,0.08); color: #c04040; border-color: rgba(192,64,64,0.25); }
    .ab-del:hover { background: #c04040; color: #fff; }

    /* 빈 상태 */
    .empty-overlay {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 0.4rem;
      color: rgba(90,48,16,0.45); font-size: 0.8rem; font-weight: 600;
    }
    .empty-overlay span { font-size: 2rem; }

    /* ── 새 이야기 버튼 (패널 우상단 부근 오버레이) ── */
    .btn-new-story {
      position: absolute;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(200,144,42,0.92);
      border: 2px solid #f0b84a;
      color: #fff; font-size: 0.78rem; font-weight: 700;
      padding: 0.28rem 1rem; border-radius: 999px;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
      white-space: nowrap; z-index: 5;
      transition: background 0.15s;
    }
    .btn-new-story:hover { background: rgba(168,112,32,0.95); }

    /* ── X 닫기 버튼 (이미지 우상단 X 위치에 투명 클릭 영역) ── */
    .btn-x {
      position: absolute;
      top: 1.5%;
      right: 3%;
      width: 6.5%;
      height: 12%;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 5;
    }

    /* ── 닫기 버튼 (이미지 하단 닫기 배너 위 투명 클릭 영역) ── */
    .btn-close-bottom {
      position: absolute;
      bottom: 2%;
      left: 50%;
      transform: translateX(-50%);
      width: 16%;
      height: 12%;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 5;
    }

    /* ── 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fdf5e4; border-radius: 14px;
      border: 2.5px solid #c8a87a;
      padding: 1.75rem; width: 90%; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45);
    }
    .modal-box h2 { font-size: 1.1rem; font-weight: 800; color: #3d2b1f; margin-bottom: 1.1rem; font-family: 'Pretendard', serif; }
    .modal-footer { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.1rem; }

    @media (max-width: 640px) {
      .panel-wrap { max-width: 100%; }
      .story-row { grid-template-columns: 60px 1fr auto; min-height: 40px; }
      .action-btn { font-size: 0.6rem; padding: 0.18rem 0.45rem; }
    }
  </style>
</head>
<body>

  <div class="panel-wrap">
    <!-- 배경 이미지 -->
    <img src="Tool.png" class="panel-img" alt="패널 배경">

    <!-- 스토리 목록 동적 영역 -->
    <div class="story-overlay" id="story-overlay"></div>

    <!-- 새 이야기 버튼 -->
    <button class="btn-new-story" onclick="openCreateModal()">✏️ 새 이야기</button>

    <!-- X 닫기 (이미지 우상단 X 위에 투명 클릭 영역) -->
    <button class="btn-x" onclick="location.href='index.html'" title="닫기"></button>

    <!-- 닫기 (이미지 하단 닫기 배너 위 투명 클릭 영역) -->
    <button class="btn-close-bottom" onclick="location.href='index.html'" title="닫기"></button>
  </div>

  <!-- 새 이야기 모달 -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-box">
      <h2>✏️ 새 이야기 만들기</h2>
      <div class="form-group"><label>제목 *</label><input type="text" id="inp-title" placeholder="예: 기사의 선택" maxlength="80"></div>
      <div class="form-group"><label>한 줄 소개</label><input type="text" id="inp-desc" placeholder="독자에게 보여질 짧은 설명"></div>
      <div class="form-group"><label>작가 이름</label><input type="text" id="inp-author" placeholder="닉네임"></div>
      <div class="form-group"><label>장르</label>
        <select id="inp-genre">
          <option value="SF">SF</option><option value="판타지">판타지</option>
          <option value="로맨스">로맨스</option><option value="공포">공포</option>
          <option value="미스터리">미스터리</option><option value="기타" selected>기타</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeCreateModal()">취소</button>
        <button class="btn btn-primary btn-sm" onclick="createStory()">만들고 편집하기</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box">
      <h2>🗑 스토리 삭제</h2>
      <p style="color:#7a5c3e;font-size:0.88rem">삭제하면 복구할 수 없어요. 정말 삭제하시겠어요?</p>
      <p id="delete-title-txt" style="margin-top:0.6rem;font-weight:700;font-size:0.92rem;color:#3d2b1f"></p>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeDeleteModal()">취소</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    let deleteId = null;

    function getStatus(st) {
      if (st.published) return { label: '공개', cls: 'status-public', icon: '✅' };
      if (Object.keys(st.nodes || {}).length > 0) return { label: '작성 중', cls: 'status-writing', icon: '✍️' };
      return { label: '비공개', cls: 'status-private', icon: '🔒' };
    }

    function render() {
      const stories = Storage.getAll();
      const el = document.getElementById('story-overlay');
      if (!stories.length) {
        el.innerHTML = `<div class="empty-overlay"><span>📖</span><p>아직 이야기가 없어요</p></div>`;
        return;
      }
      el.innerHTML = stories.map(st => {
        const s = getStatus(st);
        const pubBtn = st.published
          ? `<button class="action-btn ab-unpub" onclick="togglePublish('${st.id}')">🔒 비공개</button>`
          : `<button class="action-btn ab-pub"   onclick="togglePublish('${st.id}')">🚀 공개</button>`;
        return `
          <div class="story-row">
            <div><span class="status-badge ${s.cls}">${s.icon} ${s.label}</span></div>
            <div class="story-title-cell" title="${escapeHtml(st.title)}">${escapeHtml(st.title)}</div>
            <div class="action-btns">
              <button class="action-btn ab-edit" onclick="location.href='editor.html?id=${st.id}'">✏️ 수정</button>
              ${pubBtn}
              <button class="action-btn ab-del" onclick="openDeleteModal('${st.id}')">🗑</button>
            </div>
          </div>`;
      }).join('');
    }

    function openCreateModal() {
      document.getElementById('create-modal').classList.add('open');
      setTimeout(() => document.getElementById('inp-title').focus(), 50);
    }
    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('open');
      ['inp-title','inp-desc','inp-author'].forEach(id => document.getElementById(id).value = '');
    }
    function createStory() {
      const title = document.getElementById('inp-title').value.trim();
      if (!title) { showToast('제목을 입력해주세요', 'error'); return; }
      const story = createEmptyStory(
        title,
        document.getElementById('inp-desc').value.trim(),
        document.getElementById('inp-author').value.trim() || '익명',
        document.getElementById('inp-genre').value
      );
      Storage.save(story);
      location.href = `editor.html?id=${story.id}`;
    }
    function togglePublish(id) {
      const st = Storage.get(id); if (!st) return;
      if (!st.published && Object.keys(st.nodes || {}).length < 2) {
        showToast('장면이 2개 이상 있어야 공개할 수 있어요', 'error'); return;
      }
      st.published = !st.published;
      Storage.save(st);
      showToast(st.published ? '공개되었어요 🎉' : '비공개로 전환되었어요', 'success');
      render();
    }
    function openDeleteModal(id) {
      deleteId = id;
      document.getElementById('delete-title-txt').textContent = Storage.get(id)?.title || '';
      document.getElementById('delete-modal').classList.add('open');
    }
    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('open');
      deleteId = null;
    }
    function confirmDelete() {
      if (!deleteId) return;
      Storage.delete(deleteId);
      closeDeleteModal();
      showToast('삭제되었어요', 'success');
      render();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeCreateModal(); closeDeleteModal(); }
    });
    document.getElementById('inp-title')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') createStory();
    });

    initSampleData();
    render();
  </script>
</body>
</html>
