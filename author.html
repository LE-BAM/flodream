<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 이야기 관리 — 동네서점</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: url('bookstore.png') center top / cover fixed;
      background-color: #3a2410;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 768px) { body { background-attachment: scroll; } }

    /* ── 메인 영역 ── */
    .author-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── 패널 래퍼 ── */
    .panel-wrap {
      position: relative;
      /* 화면 꽉 차게: 너비는 뷰포트 92%, 높이가 넘치면 높이 기준으로 제한 */
      width: min(92vw, calc((100vh - 80px) * 2752 / 1536));
    }

    /* ── Tool 이미지 (전체 패널 배경) ── */
    .panel-img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      pointer-events: none;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    /* ── 컬럼 헤더 오버레이 (이미지 다크 헤더 행 위에 텍스트만) ── */
    .col-header-overlay {
      position: absolute;
      top: 22.5%;
      bottom: 73%;
      left: 8%;
      right: 5%;
      display: grid;
      grid-template-columns: 13% 1fr 22%;
      align-items: center;
      pointer-events: none;
    }
    .col-header-overlay span {
      font-family: 'Pretendard', sans-serif;
      font-size: clamp(0.65rem, 1.2vw, 1rem);
      font-weight: 600;
      color: #F0D19D;
      text-align: center;
      letter-spacing: 0.04em;
    }
    .col-header-overlay span:nth-child(2) { text-align: center; }
    .col-header-overlay span:nth-child(3) { text-align: center; }

    /* ── 스토리 목록 오버레이 ── */
    .story-overlay {
      position: absolute;
      top: 27%;
      bottom: 25%;
      left: 8%;
      right: 31%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      scrollbar-width: none;
    }
    .story-overlay::-webkit-scrollbar { display: none; }

    /* ── 스토리 행 — 이미지 1행 높이에 맞춰 고정 (4행 균등) ── */
    .story-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 0.75rem 0 0.4rem;
      height: 25%;        /* overlay 4등분 = 이미지 행 1개 높이 */
      flex-shrink: 0;
      background: transparent;
    }

    /* 상태 뱃지 */
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.22rem 0.6rem; border-radius: 999px;
      font-size: 0.7rem; font-weight: 700; white-space: nowrap;
    }
    .st-pub     { background: #d4f0e0; color: #1e7a4a; border: 1.5px solid #74c69d; }
    .st-writing { background: #ede0f8; color: #6a2c8a; border: 1.5px solid #b48acc; }
    .st-private { background: #fde8c8; color: #8B5E3C; border: 1.5px solid #c8a87a; }

    /* 제목 */
    .title-cell {
      flex: 1;
      font-size: 0.9rem; font-weight: 700;
      color: #3d2b1f;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }

    /* 액션 버튼 */
    .action-btns { display: flex; gap: 0.28rem; flex-shrink: 0; }
    .action-btn {
      padding: 0.22rem 0.6rem;
      border-radius: 999px;
      font-size: 0.68rem; font-weight: 700;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer; border: 1.5px solid;
      white-space: nowrap; transition: all 0.12s;
    }
    .ab-edit  { background: rgba(139,94,60,0.1); color: #7a4820; border-color: #c8a87a; }
    .ab-edit:hover  { background: #7a4820; color: #fff; }
    .ab-pub   { background: rgba(46,107,79,0.1); color: #2d6a4f; border-color: #74c69d; }
    .ab-pub:hover   { background: #2d6a4f; color: #fff; }
    .ab-unpub { background: rgba(139,94,60,0.1); color: #7a4820; border-color: #c8a87a; }
    .ab-unpub:hover { background: #7a4820; color: #fff; }
    .ab-del   { background: rgba(192,64,64,0.08); color: #a03030; border-color: #e07070; }
    .ab-del:hover   { background: #a03030; color: #fff; border-color: #a03030; }

    /* 빈 상태 */
    .empty-overlay {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 0.4rem;
      color: rgba(90,48,16,0.45);
      font-size: 0.8rem; font-weight: 600;
    }
    .empty-overlay span { font-size: 2rem; }

    /* ── 새 이야기 버튼 (이미지 우측 타이틀 영역 근처) ── */
    .btn-new {
      position: absolute;
      top: 17%;
      left: 55%;
      background: rgba(200,144,42,0.92);
      border: 2px solid #f0b84a;
      color: #fff; font-size: 0.75rem; font-weight: 700;
      padding: 0.25rem 0.9rem; border-radius: 999px;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
      white-space: nowrap; z-index: 5;
      transition: background 0.15s;
    }
    .btn-new:hover { background: rgba(168,112,30,0.95); }

    /* ── X 닫기 (이미지 패널 우상단 X 위치) ── */
    .btn-x {
      position: absolute;
      top: 10%;
      left: 67%;
      width: 5%;
      height: 8%;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 5;
    }

    /* ── 닫기 버튼 (이미지 하단 닫기 배너) ── */
    .btn-close-bottom {
      position: absolute;
      bottom: 9%;
      left: 14%;
      width: 20%;
      height: 10%;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 5;
    }

    /* ── 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fdf5e4; border-radius: 14px;
      border: 2.5px solid #c8a87a;
      padding: 1.75rem; width: 90%; max-width: 460px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45);
      animation: modalIn 0.18s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:scale(0.96) translateY(-6px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal-box h2 { font-size: 1.1rem; font-weight: 800; color: #3d2b1f; margin-bottom: 1.1rem; font-family: 'Pretendard', serif; }
    .modal-footer { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.1rem; }
  </style>
</head>
<body>

  <!-- ── 내비게이션 바 ── -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">📚 동네서점</a>
    <ul class="navbar-nav">
      <li><a href="index.html">홈</a></li>
      <li><a href="author.html" class="active">내 이야기</a></li>
      <li><a href="index.html#stories">스토리 찾기</a></li>
    </ul>
    <div class="navbar-search">
      <span class="navbar-search-icon">🔍</span>
      <input type="text" placeholder="스토리 검색...">
    </div>
    <div class="navbar-right">
      <span class="navbar-username">작가님</span>
      <button class="navbar-logout">로그아웃</button>
    </div>
  </nav>

  <!-- ── 메인 ── -->
  <div class="author-main">
    <div class="panel-wrap">

      <!-- Tool 이미지 (전체 패널 비주얼) -->
      <img src="Realtool.png" class="panel-img" alt=""
           onerror="this.onerror=null; this.src='Too.png';">

      <!-- 컬럼 헤더 오버레이 -->
      <div class="col-header-overlay">
        <span>상태</span>
        <span>제목</span>
        <span>편집</span>
      </div>

      <!-- 스토리 목록 동적 오버레이 -->
      <div class="story-overlay" id="story-overlay"></div>

      <!-- 새 이야기 버튼 -->
      <button class="btn-new" onclick="openCreateModal()">✏️ 새 이야기</button>

      <!-- X 닫기 투명 클릭 -->
      <button class="btn-x" onclick="location.href='index.html'" title="닫기"></button>

      <!-- 하단 닫기 투명 클릭 -->
      <button class="btn-close-bottom" onclick="location.href='index.html'" title="닫기"></button>
    </div>
  </div>

  <!-- 새 이야기 모달 -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-box">
      <h2>✏️ 새 이야기 만들기</h2>
      <div class="form-group"><label>제목 *</label><input type="text" id="inp-title" placeholder="예: 기사의 선택" maxlength="80"></div>
      <div class="form-group"><label>한 줄 소개</label><input type="text" id="inp-desc" placeholder="독자에게 보여질 짧은 설명"></div>
      <div class="form-group"><label>작가 이름</label><input type="text" id="inp-author" placeholder="닉네임"></div>
      <div class="form-group"><label>장르</label>
        <select id="inp-genre">
          <option value="SF">SF</option><option value="판타지">판타지</option>
          <option value="로맨스">로맨스</option><option value="공호">공포</option>
          <option value="미스터리">미스터리</option><option value="기타" selected>기타</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeCreateModal()">취소</button>
        <button class="btn btn-primary btn-sm" onclick="createStory()">만들고 편집하기</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box">
      <h2>🗑 스토리 삭제</h2>
      <p style="color:#7a5c3e;font-size:0.88rem;margin-bottom:0.5rem">삭제하면 복구할 수 없어요. 정말 삭제하시겠어요?</p>
      <p id="delete-title-txt" style="font-weight:700;font-size:0.95rem;color:#3d2b1f"></p>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" onclick="closeDeleteModal()">취소</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    let deleteId = null;

    function getStatus(st) {
      if (st.published) return { label: '공개', cls: 'st-pub', icon: '✅' };
      if (Object.keys(st.nodes || {}).length > 0) return { label: '작성 중', cls: 'st-writing', icon: '✍️' };
      return { label: '비공개', cls: 'st-private', icon: '🔒' };
    }

    function render() {
      const stories = Storage.getAll();
      const el = document.getElementById('story-overlay');
      if (!stories.length) {
        el.innerHTML = `<div class="empty-overlay"><span>📖</span><p>아직 이야기가 없어요</p></div>`;
        return;
      }
      el.innerHTML = stories.map(st => {
        const s = getStatus(st);
        const pubBtn = st.published
          ? `<button class="action-btn ab-unpub" onclick="togglePublish('${st.id}')">🔒 비공개</button>`
          : `<button class="action-btn ab-pub"   onclick="togglePublish('${st.id}')">🚀 공개</button>`;
        return `
          <div class="story-row">
            <span class="status-badge ${s.cls}" style="flex-shrink:0">${s.icon} ${s.label}</span>
            <div class="title-cell" title="${escapeHtml(st.title)}">${escapeHtml(st.title)}</div>
            <div class="action-btns" style="flex-shrink:0">
              <button class="action-btn ab-edit" onclick="location.href='editor.html?id=${st.id}'">✏️ 수정</button>
              ${pubBtn}
              <button class="action-btn ab-del" onclick="openDeleteModal('${st.id}')">🗑</button>
            </div>
          </div>`;
      }).join('');
    }

    function openCreateModal() {
      document.getElementById('create-modal').classList.add('open');
      setTimeout(() => document.getElementById('inp-title').focus(), 50);
    }
    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('open');
      ['inp-title','inp-desc','inp-author'].forEach(id => document.getElementById(id).value = '');
    }
    function createStory() {
      const title = document.getElementById('inp-title').value.trim();
      if (!title) { showToast('제목을 입력해주세요', 'error'); return; }
      const story = createEmptyStory(
        title,
        document.getElementById('inp-desc').value.trim(),
        document.getElementById('inp-author').value.trim() || '익명',
        document.getElementById('inp-genre').value
      );
      Storage.save(story);
      location.href = `editor.html?id=${story.id}`;
    }
    function togglePublish(id) {
      const st = Storage.get(id); if (!st) return;
      if (!st.published && Object.keys(st.nodes || {}).length < 2) {
        showToast('장면이 2개 이상 있어야 공개할 수 있어요', 'error'); return;
      }
      st.published = !st.published;
      Storage.save(st);
      showToast(st.published ? '공개되었어요 🎉' : '비공개로 전환되었어요', 'success');
      render();
    }
    function openDeleteModal(id) {
      deleteId = id;
      document.getElementById('delete-title-txt').textContent = Storage.get(id)?.title || '';
      document.getElementById('delete-modal').classList.add('open');
    }
    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('open');
      deleteId = null;
    }
    function confirmDelete() {
      if (!deleteId) return;
      Storage.delete(deleteId);
      closeDeleteModal();
      showToast('삭제되었어요', 'success');
      render();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeCreateModal(); closeDeleteModal(); }
    });
    document.getElementById('inp-title')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') createStory();
    });

    initSampleData();
    render();
  </script>
</body>
</html>
