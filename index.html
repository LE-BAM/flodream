<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동네서점 — 인터랙티브 픽션 플랫폼</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* Hero */
    .hero-wrap { position: relative; border-bottom: 2px solid var(--border); }
    #hero-canvas { display: block; width: 100%; height: 380px; image-rendering: pixelated; }
    .hero-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; padding: 0 6%;
    }
    .hero-char { position: relative; flex-shrink: 0; margin-right: 2.5rem; }
    .speech-bubble {
      position: absolute; bottom: 105%; left: 50%; transform: translateX(-20%);
      background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
      padding: 0.7rem 1rem; font-size: 0.82rem; font-weight: 700; color: var(--text);
      white-space: nowrap; box-shadow: var(--shadow); line-height: 1.5;
    }
    .speech-bubble::after {
      content: ''; position: absolute; bottom: -11px; left: 28%;
      border: 6px solid transparent; border-top-color: var(--border);
    }
    .speech-bubble::before {
      content: ''; position: absolute; bottom: -8px; left: 29%;
      border: 5px solid transparent; border-top-color: var(--surface); z-index: 1;
    }
    #char-canvas { display: block; image-rendering: pixelated; }
    .hero-text {
      background: rgba(253,245,228,0.9); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.75rem 2rem;
      box-shadow: var(--shadow-card); max-width: 400px;
    }
    .hero-text h1 {
      font-family: Georgia, serif; font-size: 1.6rem; line-height: 1.4;
      color: var(--text); margin-bottom: 0.75rem;
    }
    .hero-text p { font-size: 0.88rem; color: var(--text-muted); line-height: 1.7; }

    /* Feature cards */
    .feat-section { background: rgba(139,94,60,0.06); border-bottom: 2px solid var(--border); padding: 2rem 0; }
    .feat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; max-width: 860px; margin: 0 auto; padding: 0 2rem; }
    .feat-card {
      background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: block; box-shadow: var(--shadow);
      position: relative; overflow: hidden;
    }
    .feat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--accent); opacity: 0.6;
    }
    .feat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); border-color: var(--accent); }
    .feat-card:hover::before { opacity: 1; }
    .feat-icon { font-size: 2.4rem; margin-bottom: 0.85rem; display: block; }
    .feat-card h3 { font-family: Georgia, serif; font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; font-weight: 700; }
    .feat-card p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.55; }

    /* Story section */
    .section { padding: 2.5rem 0 4rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-title { font-size: 1.3rem; font-weight: 700; font-family: Georgia, serif; color: var(--accent); }

    /* Filters */
    .filter-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 0.25rem; }
    .filter-btn {
      padding: 0.28rem 0.9rem; border-radius: var(--radius-pill);
      border: 1.5px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 0.78rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { color: var(--accent); border-color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Story grid */
    .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 1.25rem; }
    .story-card {
      background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border);
      overflow: hidden; cursor: pointer; transition: all 0.2s;
      box-shadow: rgba(80,40,10,0.07) 0px 2px 8px;
    }
    .story-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); border-color: var(--accent); }
    .story-cover { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .story-cover::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(80,40,10,0.2)); }
    .story-body { padding: 1.1rem; }
    .story-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
    .story-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; line-height: 1.3; font-family: Georgia, serif; color: var(--text); }
    .story-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1rem; }
    .story-footer { display: flex; align-items: center; justify-content: space-between; }
    .story-author { font-size: 0.75rem; color: var(--text-dim); }
    .rank-badge { position: absolute; top: 10px; left: 10px; z-index: 2; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
    .rank-1 { background: #FFD700; color: #3d2b1f; }
    .rank-2 { background: #C0C0C0; color: #3d2b1f; }
    .rank-3 { background: #CD7F32; color: #fff; }
    .play-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; color: white; transition: all 0.15s; flex-shrink: 0; }
    .play-circle:hover { background: var(--accent-hover); transform: scale(1.08); box-shadow: var(--shadow); }

    /* Stats */
    .stats-row { display: flex; gap: 2.5rem; justify-content: center; padding: 1.5rem 0; border-top: 1.5px solid var(--border); margin-top: 3rem; }
    .stat-num { font-size: 1.75rem; font-weight: 700; color: var(--accent); font-family: Georgia, serif; text-align: center; }
    .stat-lbl { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; text-align: center; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">📖 동네서점</a>
    <ul class="navbar-nav">
      <li><a href="index.html" class="active">책방</a></li>
      <li><a href="author.html">내 이야기</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <div class="hero-wrap">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-overlay">
      <div class="hero-char">
        <div class="speech-bubble">여기에 당신만의 멋진<br>이야기를 담아주세요!</div>
        <canvas id="char-canvas" width="90" height="126"></canvas>
      </div>
      <div class="hero-text">
        <h1>어서오세요!<br>당신의 이야기를<br>기다리고 있었어요.</h1>
        <p>동네서점에 오신 것을 환영합니다.<br>분기형 텍스트 어드벤처를 읽고, 쓰고, 나누세요.</p>
      </div>
    </div>
  </div>

  <!-- Feature Cards -->
  <div class="feat-section">
    <div class="feat-grid">
      <a href="author.html" class="feat-card">
        <span class="feat-icon">📝</span>
        <h3>내 이야기 쓰기</h3>
        <p>새로운 스토리를 만들고<br>분기와 엔딩을 설계하세요</p>
      </a>
      <a href="author.html" class="feat-card">
        <span class="feat-icon">📁</span>
        <h3>내 이야기 관리</h3>
        <p>발행, 편집, 조회수 확인</p>
      </a>
      <a href="#stories" class="feat-card">
        <span class="feat-icon">📚</span>
        <h3>이야기 읽기</h3>
        <p>분기형 텍스트 어드벤처를<br>탐험해보세요</p>
      </a>
    </div>
  </div>

  <!-- Stories -->
  <section class="section" id="stories">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">📚 책방 컬렉션</h2>
        <span id="story-count" class="text-muted text-sm"></span>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" data-sort="views">조회수순</button>
        <button class="filter-btn" data-sort="newest">최신순</button>
        <div class="filter-sep"></div>
        <button class="filter-btn genre-btn active" data-genre="all">전체</button>
        <button class="filter-btn genre-btn" data-genre="SF">SF</button>
        <button class="filter-btn genre-btn" data-genre="판타지">판타지</button>
        <button class="filter-btn genre-btn" data-genre="로맨스">로맨스</button>
        <button class="filter-btn genre-btn" data-genre="공포">공포</button>
        <button class="filter-btn genre-btn" data-genre="미스터리">미스터리</button>
        <button class="filter-btn genre-btn" data-genre="기타">기타</button>
      </div>
      <div class="stories-grid" id="stories-grid"></div>
      <div class="stats-row" id="stats-row"></div>
    </div>
  </section>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    /* ===== HERO CANVAS ===== */
    function drawHero() {
      const canvas = document.getElementById('hero-canvas');
      const W = canvas.offsetWidth, H = 380;
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Warm wall background
      ctx.fillStyle = '#f0d9a8';
      ctx.fillRect(0, 0, W, H);

      // Center warm glow (lamp light)
      const glow = ctx.createRadialGradient(W/2, H*0.45, 0, W/2, H*0.45, W*0.38);
      glow.addColorStop(0, 'rgba(255,215,100,0.32)');
      glow.addColorStop(1, 'rgba(255,215,100,0)');
      ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

      // Ceiling (dark wood)
      ctx.fillStyle = '#5c3010';
      ctx.fillRect(0, 0, W, 44);
      for (let x = 0; x < W; x += 48) {
        ctx.fillStyle = '#4a2408'; ctx.fillRect(x, 0, 2, 44);
        ctx.fillStyle = '#6e3c18'; ctx.fillRect(x+3, 0, 1, 44);
      }
      ctx.fillStyle = '#8B5E3C'; ctx.fillRect(0, 42, W, 5);

      // Subtle wall texture (vertical panels between shelves)
      ctx.strokeStyle = 'rgba(139,94,60,0.07)';
      ctx.lineWidth = 1;
      for (let y = 55; y < H - 85; y += 20) {
        ctx.beginPath(); ctx.moveTo(145, y); ctx.lineTo(W - 145, y); ctx.stroke();
      }

      // Floor planks
      for (let x = 0; x < W; x += 46) {
        ctx.fillStyle = (Math.floor(x/46)%2===0) ? '#9a5e30' : '#8B5028';
        ctx.fillRect(x, H - 85, 46, 85);
        ctx.fillStyle = '#5c3010'; ctx.fillRect(x, H-85, 2, 85);
      }
      ctx.fillStyle = '#5c3010'; ctx.fillRect(0, H-85, W, 3);
      ctx.fillStyle = '#b07040'; ctx.fillRect(0, H-85, W, 2);

      // Left bookshelf
      drawShelf(ctx, 0, 44, 145, H - 129, 0);
      // Right bookshelf
      drawShelf(ctx, W - 145, 44, 145, H - 129, 1);

      // Fairy lights string
      ctx.strokeStyle = '#8B5E3C'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(148, 52); ctx.lineTo(W-148, 52); ctx.stroke();
      for (let x = 168; x < W - 148; x += 32) {
        // cord
        ctx.strokeStyle = '#8B5E3C'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, 52); ctx.lineTo(x, 62); ctx.stroke();
        // glow
        const lg = ctx.createRadialGradient(x, 66, 0, x, 66, 14);
        lg.addColorStop(0, 'rgba(255,220,70,0.5)'); lg.addColorStop(1, 'rgba(255,220,70,0)');
        ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(x, 66, 14, 0, Math.PI*2); ctx.fill();
        // bulb
        ctx.fillStyle = '#ffe066'; ctx.beginPath(); ctx.arc(x, 66, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff8a0'; ctx.beginPath(); ctx.arc(x-1, 64, 2, 0, Math.PI*2); ctx.fill();
        // heart every other
        if (Math.floor(x/32)%2===0) drawPixelHeart(ctx, x+16, 58, '#e87888');
      }

      // Corner plants
      drawPlant(ctx, 148, H - 85);
      drawPlant(ctx, W - 148, H - 85);
    }

    function drawShelf(ctx, x, y, w, h, seed) {
      const BOOKS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63','#00bcd4','#ff5722','#c0392b','#16a085','#8e44ad','#d35400'];
      ctx.fillStyle = '#2e1005'; ctx.fillRect(x, y, w, h);
      for (let wy = y; wy < y+h; wy += 7) { ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(x, wy, w, 1); }
      let ci = seed * 11;
      const SHELVES = 4, spacing = h / SHELVES;
      for (let i = 0; i < SHELVES; i++) {
        const boardY = y + (i+1)*spacing - 6;
        let bx = x + 4;
        while (bx < x+w-4) {
          const bw = 5 + (ci%4), bh = 17 + (ci%22);
          ctx.fillStyle = BOOKS[ci%BOOKS.length]; ctx.fillRect(bx, boardY-bh, bw, bh);
          ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fillRect(bx, boardY-bh, 1, bh);
          ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(bx+1, boardY-bh+4, bw-2, 1);
          bx += bw+1; ci += 7;
        }
        ctx.fillStyle = '#8B5E3C'; ctx.fillRect(x, boardY, w, 6);
        ctx.fillStyle = '#a87040'; ctx.fillRect(x, boardY, w, 2);
      }
      ctx.strokeStyle = '#c8902a'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
    }

    function drawPixelHeart(ctx, x, y, color) {
      ctx.fillStyle = color;
      [[1,0],[2,0],[4,0],[5,0],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],
       [0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[1,3],[2,3],[3,3],[4,3],[5,3],
       [2,4],[3,4],[4,4],[3,5]].forEach(([px,py]) => ctx.fillRect(x+px*2-6, y+py*2, 2, 2));
    }

    function drawPlant(ctx, x, y) {
      ctx.fillStyle = '#c87830'; ctx.fillRect(x-13, y-20, 26, 20);
      ctx.fillStyle = '#a06020'; ctx.fillRect(x-15, y-22, 30, 4);
      ctx.fillStyle = '#5a8030'; ctx.fillRect(x-2, y-52, 4, 32);
      [[-1,-1],[1,1]].forEach(([dx,dy]) => {
        ctx.fillStyle = '#4a7028';
        ctx.beginPath(); ctx.ellipse(x+dx*20, y-42+dy*3, 20, 9, dx*0.4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#6aaa3a';
        ctx.beginPath(); ctx.ellipse(x+dx*15, y-44+dy*2, 13, 6, dx*0.4, 0, Math.PI*2); ctx.fill();
      });
    }

    /* ===== PIXEL CHARACTER (blonde bookstore girl) ===== */
    function drawCharacter() {
      const canvas = document.getElementById('char-canvas');
      const ctx = canvas.getContext('2d');
      const S = 3;
      const p = (gx,gy,gw,gh,col) => { ctx.fillStyle=col; ctx.fillRect(gx*S,gy*S,gw*S,gh*S); };

      // Hair back strands
      p(2,1,8,3,'#f0c030'); p(1,4,1,7,'#f0c030'); p(10,4,1,7,'#f0c030');
      p(2,9,3,5,'#f0c030'); p(7,10,3,4,'#f0c030');
      // Face skin
      p(3,3,6,6,'#f5c8a0');
      // Hair top
      p(2,0,8,4,'#f0c030'); p(2,3,2,1,'#f0c030'); p(8,3,2,1,'#f0c030');
      // Eyes
      p(4,5,2,2,'#fff'); p(7,5,2,2,'#fff');
      p(4,5,1,1,'#3a2010'); p(8,5,1,1,'#3a2010');
      p(4,4,1,1,'#fff'); p(8,4,1,1,'#fff'); // shine
      // Blush
      p(3,7,2,1,'#f5a0a0'); p(7,7,2,1,'#f5a0a0');
      // Mouth
      p(5,8,2,1,'#c07060');
      // Neck
      p(5,9,2,2,'#f5c8a0');
      // White shirt
      p(2,11,8,5,'#f4f0e8'); p(1,11,1,4,'#e8e4dc'); p(10,11,1,4,'#e8e4dc');
      // Apron (warm brown)
      p(3,11,1,1,'#b8601a'); p(8,11,1,1,'#b8601a'); // straps
      p(4,12,4,5,'#c87830');
      // Cat pocket on apron
      p(5,14,2,2,'#d89040'); p(5,13,1,1,'#d89040'); p(6,13,1,1,'#d89040');
      p(5,15,1,1,'#a06020'); p(6,15,1,1,'#a06020'); // pocket detail
      // Arms / hands
      p(1,12,2,5,'#f5c8a0'); p(9,12,2,5,'#f5c8a0');
      // Wave right hand up
      p(9,10,2,3,'#f5c8a0');
      // Jeans
      p(4,16,2,5,'#4a6a9a'); p(6,16,2,5,'#4a6a9a'); p(5,16,1,5,'#3a5a8a');
      // Shoes
      p(3,21,3,1,'#4a2a10'); p(6,21,3,1,'#4a2a10');
    }

    /* ===== STORY BROWSER ===== */
    const GENRE_EMOJI = { SF:'🚀', '판타지':'⚔️', '로맨스':'💕', '공포':'👻', '미스터리':'🔍', '기타':'📖' };
    let currentGenre = 'all', currentSort = 'views';

    function renderStories() {
      let filtered = Storage.getAll().filter(s => s.published);
      if (currentGenre !== 'all') filtered = filtered.filter(s => s.genre === currentGenre);
      filtered = currentSort === 'views'
        ? [...filtered].sort((a,b) => (b.views||0)-(a.views||0))
        : [...filtered].sort((a,b) => b.createdAt - a.createdAt);
      document.getElementById('story-count').textContent = `${filtered.length}개의 이야기`;

      const rankMap = {};
      const groups = {};
      filtered.forEach(s => { if (!groups[s.genre]) groups[s.genre]=[]; groups[s.genre].push(s); });
      Object.values(groups).forEach(g => g.sort((a,b)=>(b.views||0)-(a.views||0)).forEach((s,i) => rankMap[s.id]=i+1));

      const grid = document.getElementById('stories-grid');
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📭</div><h3>아직 공개된 이야기가 없어요</h3><p>첫 번째 이야기를 작성해보세요!</p><a href="author.html" class="btn btn-primary">이야기 쓰기</a></div>`;
        return;
      }

      grid.innerHTML = filtered.map(story => {
        const emoji = GENRE_EMOJI[story.genre]||'📖';
        const nc = Object.keys(story.nodes||{}).length;
        const ec = Object.values(story.nodes||{}).filter(n=>n.isEnding).length;
        const gr = rankMap[story.id];
        const rankBadge = gr<=3 ? `<div class="rank-badge rank-${gr}">${gr}</div>` : '';
        return `
          <div class="story-card" onclick="location.href='play.html?id=${story.id}'">
            <div class="story-cover" style="background:linear-gradient(145deg,${story.coverColor}50,${story.coverColor}20);position:relative">
              ${rankBadge}<span style="position:relative;z-index:1">${emoji}</span>
            </div>
            <div class="story-body">
              <div class="story-meta">
                <span class="badge badge-muted">${story.genre}</span>
                <span class="text-sm text-dim">${nc}장면 · ${ec}엔딩</span>
              </div>
              <h3 class="story-title">${escapeHtml(story.title)}</h3>
              <p class="story-desc">${escapeHtml(story.description)}</p>
              <div class="story-footer">
                <span class="story-author">👁 ${(story.views||0).toLocaleString()} · ${escapeHtml(story.author)}</span>
                <button class="play-circle" onclick="event.stopPropagation();location.href='play.html?id=${story.id}'">▶</button>
              </div>
            </div>
          </div>`;
      }).join('');

      const all = Storage.getAll();
      document.getElementById('stats-row').innerHTML = `
        <div><div class="stat-num">${all.filter(s=>s.published).length}</div><div class="stat-lbl">공개 이야기</div></div>
        <div><div class="stat-num">${all.reduce((s,st)=>s+(st.views||0),0).toLocaleString()}</div><div class="stat-lbl">총 조회수</div></div>
        <div><div class="stat-num">${all.reduce((s,st)=>s+Object.keys(st.nodes||{}).length,0)}</div><div class="stat-lbl">총 장면</div></div>`;
    }

    // Filter events
    document.querySelector('.filter-row').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn'); if (!btn) return;
      if (btn.dataset.sort) {
        document.querySelectorAll('[data-sort]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); currentSort = btn.dataset.sort;
      }
      if (btn.dataset.genre !== undefined) {
        document.querySelectorAll('[data-genre]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); currentGenre = btn.dataset.genre;
      }
      renderStories();
    });

    initSampleData();
    drawHero();
    drawCharacter();
    renderStories();
    window.addEventListener('resize', drawHero);
  </script>
</body>
</html>
