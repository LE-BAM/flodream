<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동네서점 — 인터랙티브 픽션 플랫폼</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Full-page bookstore background */
    body {
      background: url('bookstore.png') center top / cover fixed;
      background-color: #3a2410;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    body > * { flex-shrink: 0; }
    .feat-section { flex: 1; }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      body {
        background-attachment: scroll;
        background-position: center top;
        background-size: cover;
      }

      /* 네비바: 검색/유저 완전히 숨김 */
      .navbar {
        padding: 0 1rem !important;
        gap: 0.75rem;
        height: 54px;
        justify-content: flex-start;
      }
      .navbar-search { display: none !important; }
      .navbar-right { display: none !important; }
      .navbar-brand { font-size: 1rem; }
      .navbar-nav { flex: 0; }
      .navbar-nav a { padding: 0.35rem 0.7rem; font-size: 0.85rem; }

      /* 히어로: 2줄로 */
      .hero-wrap { padding: 1.5rem 1.25rem 0; }
      .hero-text { padding: 0.75rem 0.5rem; }
      .hero-text::before { display: none; }
      .hero-text h1 {
        font-size: clamp(0.95rem, 4.5vw, 1.2rem);
        word-break: keep-all;
        overflow-wrap: break-word;
        line-height: 1.55;
        white-space: normal;
      }

      /* 소셜 로그인 */
      .social-login { padding: 1rem 1.5rem; }
      .social-btn { width: 100%; max-width: 300px; font-size: 0.88rem; padding: 0.7rem 1rem; }

      /* 카드: 세로 1열 꽉 차게 */
      .feat-char { display: none; }
      .feat-area { padding: 0 1rem; max-width: 100%; }
      .feat-grid { grid-template-columns: 1fr; gap: 0.85rem; }
      .feat-card { min-height: auto; }
      .feat-card-img img { width: 100%; height: auto; border-radius: var(--radius); }
    }

    @media (max-width: 390px) {
      .hero-text h1 { font-size: clamp(0.85rem, 4vw, 1rem); }
      .social-btn { font-size: 0.82rem; }
    }

    /* Navbar — glassy warm overlay */
    .navbar {
      background: rgba(253,245,228,0.82) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1.5px solid rgba(200,168,122,0.5) !important;
    }

    /* Hero */
    .hero-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 2.5rem 5% 0;
    }
    .hero-text {
      text-align: center;
      position: relative;
      padding: 2.5rem 3rem;
    }
    .hero-text::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.5) 0%, transparent 75%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }
    .hero-text h1 {
      font-family: 'Pretendard', sans-serif; font-size: 3rem; font-weight: 800; line-height: 1.35;
      color: #fff; margin-bottom: 0.75rem;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.6);
    }
    .hero-text h1 .hl {
      color: #FFD966;
      text-shadow: 0 0 20px rgba(255,210,80,0.6), 0 2px 12px rgba(0,0,0,0.5);
    }
    .hero-text p {
      font-size: 0.95rem; color: rgba(255,255,255,0.92); line-height: 1.7;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    /* Social login — 독립 섹션, h1·카드와 동일 간격 */
    .social-login {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      padding: 2rem 0;
    }
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.65rem;
      width: 280px; padding: 0.75rem 1.5rem;
      border: none; border-radius: var(--radius-pill);
      font-size: 0.9rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
      text-decoration: none;
    }
    .social-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
    .social-btn-kakao { background: #FEE500; color: #191919; }
    .social-btn-naver { background: #03C75A; color: #fff; }
    .social-btn-google { background: #fff; color: #3c4043; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Feature cards */
    .feat-section {
      background: transparent;
      padding: 0 0 2rem;
      position: relative;
    }
    .feat-section::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    .feat-area { position: relative; z-index: 1; }
    /* feat-area: 카드들은 정중앙, 캐릭터는 절대 위치로 왼쪽에 겹침 */
    .feat-area {
      position: relative;
      max-width: 1300px; margin: 0 auto; padding: 0 2rem;
    }
    .feat-char {
      position: absolute; bottom: 0; left: -140px;
      width: 220px; z-index: 2;
    }
    .feat-char img.char-img {
      width: 100%; height: auto; display: block;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
    }
    .feat-char .bubble-img {
      position: absolute; bottom: 88%; left: 50%;
      transform: translateX(-100%);
      width: 180px; height: auto;
      z-index: 3;
    }
    .feat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; }
    .feat-card {
      background: rgba(253,245,228,0.88); border: 2px solid rgba(200,168,122,0.6); border-radius: var(--radius);
      padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: block; box-shadow: var(--shadow);
      position: relative; overflow: hidden;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      min-height: 300px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .feat-card-img {
      padding: 0;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    .feat-card-img::before { display: none !important; }
    .feat-card-img img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius);
    }
    .feat-card-img:hover { transform: translateY(-4px); box-shadow: none !important; background: transparent !important; }
    .feat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--accent); opacity: 0.6;
    }
    .feat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); border-color: var(--accent); background: rgba(253,245,228,0.96); }
    .feat-card:hover::before { opacity: 1; }
    .feat-icon { font-size: 2.4rem; margin-bottom: 0.85rem; display: block; }
    .feat-card h3 { font-family: Georgia, serif; font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; font-weight: 700; }
    .feat-card p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.55; }

    /* Story section — frosted scroll */
    .section { padding: 2.5rem 0 4rem; }
    .section-inner {
      background: rgba(245,230,200,0.80);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius); border: 1.5px solid rgba(200,168,122,0.5);
      padding: 2rem;
      box-shadow: rgba(80,40,10,0.18) 0px 8px 32px;
    }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-title { font-size: 1.3rem; font-weight: 700; font-family: Georgia, serif; color: var(--accent); }

    /* Filters */
    .filter-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 0.25rem; }
    .filter-btn {
      padding: 0.28rem 0.9rem; border-radius: var(--radius-pill);
      border: 1.5px solid var(--border); background: rgba(253,245,228,0.7);
      color: var(--text-muted); font-size: 0.78rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { color: var(--accent); border-color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Story grid */
    .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 1.25rem; }
    .story-card {
      background: rgba(253,245,228,0.92); border-radius: var(--radius); border: 1.5px solid rgba(200,168,122,0.6);
      overflow: hidden; cursor: pointer; transition: all 0.2s;
      box-shadow: rgba(80,40,10,0.1) 0px 2px 8px;
    }
    .story-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); border-color: var(--accent); }
    .story-cover { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .story-cover::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(80,40,10,0.2)); }
    .story-body { padding: 1.1rem; }
    .story-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
    .story-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; line-height: 1.3; font-family: Georgia, serif; color: var(--text); }
    .story-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1rem; }
    .story-footer { display: flex; align-items: center; justify-content: space-between; }
    .story-author { font-size: 0.75rem; color: var(--text-dim); }
    .rank-badge { position: absolute; top: 10px; left: 10px; z-index: 2; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
    .rank-1 { background: #FFD700; color: #3d2b1f; }
    .rank-2 { background: #C0C0C0; color: #3d2b1f; }
    .rank-3 { background: #CD7F32; color: #fff; }
    .play-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; color: white; transition: all 0.15s; flex-shrink: 0; }
    .play-circle:hover { background: var(--accent-hover); transform: scale(1.08); box-shadow: var(--shadow); }

    /* Stats */
    .stats-row { display: flex; gap: 2.5rem; justify-content: center; padding: 1.5rem 0; border-top: 1.5px solid var(--border); margin-top: 3rem; }
    .stat-num { font-size: 1.75rem; font-weight: 700; color: var(--accent); font-family: Georgia, serif; text-align: center; }
    .stat-lbl { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; text-align: center; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">📖 동네서점</a>
    <ul class="navbar-nav">
      <li><a href="index.html" class="active">책방</a></li>
      <li><a href="author.html">내 이야기</a></li>
    </ul>
    <div class="navbar-search">
      <span class="navbar-search-icon">🔍</span>
      <input type="text" placeholder="검색">
    </div>
    <div class="navbar-right">
      <span class="navbar-username">👤 동네 작가</span>
      <button class="navbar-logout">로그아웃</button>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero-wrap">
    <div class="hero-text">
      <h1>당신의 <span class="hl">선택</span>에 따라 <span class="hl">결과</span>가 달라지는<br><span class="hl">멀티 엔딩</span> 서점, <span class="hl">동네서점</span>에 어서오세요!</h1>
    </div>
  </div>

  <!-- Social Login -->
  <div class="social-login">
    <button class="social-btn social-btn-kakao">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.7 5.1 4.3 6.5l-1.1 4 4.6-3c.7.1 1.5.2 2.2.2 5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/></svg>
      카카오로 시작하기
    </button>
    <button class="social-btn social-btn-naver">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.273 12.845L7.376 3H3v18h4.727V11.155L16.624 21H21V3h-4.727z"/></svg>
      네이버로 시작하기
    </button>
    <button class="social-btn social-btn-google">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      구글로 시작하기
    </button>
  </div>

  <!-- Feature Cards -->
  <div class="feat-section">
    <div class="feat-area">
      <!-- 캐릭터: write 카드 왼쪽에 붙어서 서 있음 -->
      <div class="feat-char">
        <img src="bubble.png" alt="말풍선" class="bubble-img">
        <img src="owner.png" alt="서점 주인" class="char-img">
      </div>
      <div class="feat-grid">
        <a href="author.html?new=1" class="feat-card feat-card-img">
          <img src="write.png" alt="내 이야기 쓰기">
        </a>
        <a href="author.html" class="feat-card feat-card-img">
          <img src="manage.png" alt="내 이야기 관리">
        </a>
        <a href="author.html" class="feat-card feat-card-img">
          <img src="read.png" alt="이야기 읽기">
        </a>
      </div>
    </div>
  </div>


  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>


    initSampleData();
  </script>
</body>
</html>
