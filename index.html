<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동네서점 — 인터랙티브 픽션 플랫폼</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* Hero */
    .hero {
      padding: 5.5rem 0 4rem;
      text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 350px;
      background: radial-gradient(ellipse, rgba(30,215,96,0.07) 0%, transparent 65%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.1rem;
      color: var(--text);
    }
    .hero p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 440px;
      margin: 0 auto 2.5rem;
      line-height: 1.65;
      font-weight: 400;
    }
    .hero-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

    /* Section */
    .section { padding: 2rem 0 5rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .section-title { font-size: 1.5rem; font-weight: 700; }

    /* Genre pills */
    .genre-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .genre-btn {
      padding: 0.3rem 1rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-transform: uppercase;
    }
    .genre-btn:hover { color: var(--text); border-color: var(--text); }
    .genre-btn.active { background: var(--text); color: #000; border-color: var(--text); }

    /* Grid */
    .stories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .story-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .story-card:hover {
      background: var(--surface-3);
      box-shadow: var(--shadow-card);
    }
    .story-cover {
      height: 160px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      position: relative;
    }
    .story-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.35));
    }
    .story-body { padding: 1rem; }
    .story-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
    .story-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; line-height: 1.3; }
    .story-desc {
      font-size: 0.8rem; color: var(--text-muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 1rem;
    }
    .story-footer { display: flex; align-items: center; justify-content: space-between; }
    .story-author { font-size: 0.75rem; color: var(--text-dim); }

    /* Rank badge */
    .rank-badge {
      position: absolute; top: 10px; left: 10px; z-index: 2;
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
    }
    .rank-1 { background: #FFD700; color: #000; }
    .rank-2 { background: #C0C0C0; color: #000; }
    .rank-3 { background: #CD7F32; color: #fff; }

    /* Sort bar */
    .sort-bar { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 1.25rem; }
    .sort-lbl { font-size: 0.7rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-right: 0.25rem; }
    .sort-btn {
      padding: 0.25rem 0.85rem; border-radius: var(--radius-pill);
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 0.75rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .sort-btn:hover { color: var(--text); border-color: var(--text); }
    .sort-btn.active { background: var(--text); color: #000; border-color: var(--text); }

    /* Play button — circular */
    .play-circle {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .play-circle:hover { transform: scale(1.08); background: var(--accent-hover); box-shadow: var(--shadow-card); }

    /* Stats */
    .stats-row {
      display: flex; gap: 2.5rem; justify-content: center;
      padding: 1.5rem 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin-top: 3rem;
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
    .stat-lbl { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">✦ 동네서점</a>
    <ul class="navbar-nav">
      <li><a href="index.html" class="active">둘러보기</a></li>
      <li><a href="author.html">작가 공간</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="container">
      <div class="hero-eyebrow">Interactive Fiction Platform</div>
      <h1>당신의 선택이<br>이야기를 만든다</h1>
      <p>분기형 텍스트 게임을 읽고, 쓰고, 공유하세요. 작가가 되어 세계를 설계하거나, 독자가 되어 여러 결말을 탐험하세요.</p>
      <div class="hero-actions">
        <a href="author.html" class="btn btn-primary btn-lg">스토리 만들기</a>
        <a href="#stories" class="btn btn-ghost btn-lg">스토리 보기</a>
      </div>
    </div>
  </section>

  <section class="section" id="stories">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">공개 스토리</h2>
        <span id="story-count" class="text-muted text-sm"></span>
      </div>

      <div class="sort-bar">
        <span class="sort-lbl">정렬</span>
        <button class="sort-btn active" data-sort="views">조회수순</button>
        <button class="sort-btn" data-sort="newest">최신순</button>
      </div>

      <div class="genre-filter" id="genre-filter">
        <button class="genre-btn active" data-genre="all">전체</button>
        <button class="genre-btn" data-genre="SF">SF</button>
        <button class="genre-btn" data-genre="판타지">판타지</button>
        <button class="genre-btn" data-genre="로맨스">로맨스</button>
        <button class="genre-btn" data-genre="공포">공포</button>
        <button class="genre-btn" data-genre="미스터리">미스터리</button>
        <button class="genre-btn" data-genre="기타">기타</button>
      </div>

      <div class="stories-grid" id="stories-grid"></div>

      <div class="stats-row" id="stats-row"></div>
    </div>
  </section>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    const GENRE_EMOJI = { SF:'🚀', '판타지':'⚔️', '로맨스':'💕', '공포':'👻', '미스터리':'🔍', '기타':'📖' };
    let currentGenre = 'all';
    let currentSort = 'views';

    function renderStories() {
      const all = Storage.getAll().filter(s => s.published);
      let filtered = currentGenre === 'all' ? all : all.filter(s => s.genre === currentGenre);

      // Sort
      if (currentSort === 'views') {
        filtered = [...filtered].sort((a, b) => (b.views || 0) - (a.views || 0));
      } else {
        filtered = [...filtered].sort((a, b) => b.createdAt - a.createdAt);
      }

      document.getElementById('story-count').textContent = `${filtered.length}개`;

      const grid = document.getElementById('stories-grid');
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">📭</div>
            <h3>아직 공개된 스토리가 없어요</h3>
            <p>첫 번째 스토리를 작성해보세요!</p>
            <a href="author.html" class="btn btn-primary">스토리 만들기</a>
          </div>`;
        return;
      }

      // 장르 내 랭킹 계산 (조회수 기준)
      const rankMap = {};
      const genreGroups = {};
      filtered.forEach(s => {
        if (!genreGroups[s.genre]) genreGroups[s.genre] = [];
        genreGroups[s.genre].push(s);
      });
      Object.values(genreGroups).forEach(group => {
        const sorted = [...group].sort((a, b) => (b.views || 0) - (a.views || 0));
        sorted.forEach((s, i) => { rankMap[s.id] = i + 1; });
      });

      grid.innerHTML = filtered.map((story, globalIdx) => {
        const emoji = GENRE_EMOJI[story.genre] || '📖';
        const nc = Object.keys(story.nodes || {}).length;
        const ec = Object.values(story.nodes || {}).filter(n => n.isEnding).length;
        const views = story.views || 0;
        const genreRank = rankMap[story.id];
        const rankBadge = genreRank <= 3
          ? `<div class="rank-badge rank-${genreRank}">${genreRank}</div>` : '';

        return `
          <div class="story-card" onclick="location.href='play.html?id=${story.id}'">
            <div class="story-cover" style="background:linear-gradient(145deg,${story.coverColor}60,${story.coverColor}20);position:relative">
              ${rankBadge}
              <span style="position:relative;z-index:1">${emoji}</span>
            </div>
            <div class="story-body">
              <div class="story-meta">
                <span class="badge badge-muted">${story.genre}</span>
                <span style="font-size:0.72rem;color:var(--text-dim)">${nc}장면 · ${ec}엔딩</span>
              </div>
              <h3 class="story-title">${escapeHtml(story.title)}</h3>
              <p class="story-desc">${escapeHtml(story.description)}</p>
              <div class="story-footer">
                <span style="font-size:0.72rem;color:var(--text-dim)">👁 ${views.toLocaleString()} · by ${escapeHtml(story.author)}</span>
                <button class="play-circle" onclick="event.stopPropagation();location.href='play.html?id=${story.id}'" title="플레이">▶</button>
              </div>
            </div>
          </div>`;
      }).join('');

      // Stats
      const totalAll = Storage.getAll();
      const totalViews = totalAll.reduce((s, st) => s + (st.views || 0), 0);
      document.getElementById('stats-row').innerHTML = `
        <div class="stat-item"><div class="stat-num">${totalAll.filter(s=>s.published).length}</div><div class="stat-lbl">공개 스토리</div></div>
        <div class="stat-item"><div class="stat-num">${totalViews.toLocaleString()}</div><div class="stat-lbl">총 조회수</div></div>
        <div class="stat-item"><div class="stat-num">${totalAll.reduce((s,st)=>s+Object.keys(st.nodes||{}).length,0)}</div><div class="stat-lbl">총 장면</div></div>`;
    }

    document.getElementById('genre-filter').addEventListener('click', e => {
      const btn = e.target.closest('.genre-btn');
      if (!btn) return;
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentGenre = btn.dataset.genre;
      renderStories();
    });

    document.querySelector('.sort-bar').addEventListener('click', e => {
      const btn = e.target.closest('.sort-btn');
      if (!btn) return;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderStories();
    });

    initSampleData();
    renderStories();
  </script>
</body>
</html>
